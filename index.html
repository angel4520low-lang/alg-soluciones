<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALG Soluciones</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

</head>

<body>

<h1>ALG Soluciones</h1>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button id="registerBtn">Registrarse</button>
<button id="loginBtn">Login</button>

<script>
const supabase = window.supabase.createClient(
  "https://iprnmxpmdfyndcysjawz.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlwcm5teHBtZGZ5bmRjeXNqYXd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2Mzg3MTIsImV4cCI6MjA5MDIxNDcxMn0.kwa5cDF4FlIhbCuP88TImNW2mXl36z5gBMIaJxl90f0"
);

document.addEventListener("DOMContentLoaded", () => {

  alert("JS cargado"); // 🔥 prueba

  const registerBtn = document.getElementById("registerBtn");
  const loginBtn = document.getElementById("loginBtn");

  registerBtn.addEventListener("click", async () => {
    alert("Click registro");

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    let { error } = await supabase.auth.signUp({ email, password });

    alert(error ? error.message : "Usuario creado");
  });

  loginBtn.addEventListener("click", async () => {
    alert("Click login");

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    let { error } = await supabase.auth.signInWithPassword({ email, password });

    alert(error ? error.message : "Bienvenido");
  });

});
</script>

</body>
</html>
